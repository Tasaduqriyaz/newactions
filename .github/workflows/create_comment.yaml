name: create a comment
on:
  issues:
    types: [opened]
jobs:
  comment_with_actions:
    runs-on: ubuntu-latest
    permissions:
      issues: write  #  required to post comments
    steps:
      - name: "dump json content"
        run: echo '${{ toJSON(github.event) }}' | jq
        shell: bash
      - name: Create comment
        uses: peter-evans/create-or-update-comment@v5
        with:
          issue-number: ${{ github.event.issue.number }}
          body: |
            This is a multi-line test comment
            - With GitHub **Markdown** :sparkles:
            - Created by [create-or-update-comment][1]
            [1]: https://github.com/peter-evans/create-or-update-comment
          reactions: '+1'
          
  comment_with_api:
    runs-on: ubuntu-latest
    steps:
     - name: "comment with api"
       run: |
             gh api -X POST \
             http://api.github.com/repos/${ORGANIZATION}/${REPOSITORY}/issues/${ISSUE_NUMBER}/comments \
             -f body=' 
             this is a  comment made by github api
             '
       env:
          GITHUB_TOKEN: ${{  secrets.GITHUB_TOKEN  }}
          ORGANIZATION: ${{ github.event.organization.login }}
          REPOSITORY: ${{ github.event.repository.name }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
             
       

  
